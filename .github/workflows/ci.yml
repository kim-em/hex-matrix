name: CI
on:
  push:
    branches: [main]
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
      - name: Build library
        run: lake build
      - name: Build + smoke conformance
        run: |
          cd conformance
          lake build
          lake exe hexmatrix_emit_fixtures | head -1
      - name: Build + smoke bench (list; full comparator verify needs FLINT — see oracle-in-CI follow-up)
        run: |
          cd bench
          lake build
          lake exe hexmatrix_bench list
      - name: Assert Mathlib-free
        run: |
          if find . -type d -name mathlib | grep -q .; then
            echo "ERROR: a package pulled in Mathlib"; exit 1; fi
          if grep -rqE '^import Mathlib' HexMatrix conformance bench 2>/dev/null; then
            echo "ERROR: a source file imports Mathlib"; exit 1; fi
          echo "Mathlib-free OK"
