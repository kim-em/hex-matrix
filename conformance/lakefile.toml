name = "hex-matrix-conformance"
defaultTargets = ["HexMatrixConformance", "hexmatrix_emit_fixtures"]

[[require]]
name = "HexMatrix"
path = ".."

[[require]]
name = "hex-test-kit"
git = "https://github.com/kim-em/hex-test-kit.git"
rev = "a3355fd337e13fba815e22d55c1b21060ee4bbd1"

[[lean_lib]]
name = "HexMatrixConformance"
globs = ["HexMatrix.Conformance"]

[[lean_exe]]
name = "hexmatrix_emit_fixtures"
root = "HexMatrix.EmitFixtures"
